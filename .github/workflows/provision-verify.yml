name: provision-verify
# Runs ON the compute-monster box (self-hosted). Kicks the self-healing
# provisioner as a detached unit (reboot-safe), then reports VERIFY state.
on:
  workflow_dispatch:
  push:
    paths:
      - 'provision/**'

jobs:
  provision:
    runs-on: [self-hosted, alidzy]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest + kick provisioning (detached, survives reboot)
        run: |
          sudo git -C /opt/compute-monster pull || true
          sudo systemd-run --unit cm-provision --collect --no-block \
            bash /opt/compute-monster/provision/firstboot.sh || true
          sleep 25

      - name: Verify current state (non-fatal)
        run: sudo bash /opt/compute-monster/provision/VERIFY.sh || true

      - name: Health snapshot
        if: always()
        run: |
          echo "--- recent step logs ---"
          sudo journalctl -u cm-provision --no-pager 2>/dev/null | tail -30 || true
          echo "--- gpu ---"; nvidia-smi -L 2>&1 || true
          echo "--- lianli-daemon ---"
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          systemctl --user is-active lianli-daemon 2>&1 || true
          echo "--- storage ---"; lsblk -o NAME,SIZE,FSTYPE,MOUNTPOINT | head -8
          echo "--- temperatures ---"
          sensors 2>/dev/null | grep -E "Tctl|Tccd|edge|Composite|temp1" || true
          nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader 2>/dev/null | sed 's/^/GPU: /;s/$/ C/' || true
          echo "--- load ---"; uptime
          echo "--- network identity ---"
          hostname
          ip -4 -o addr show scope global | awk '{print $2": "$4}'
          ip route show default | head -1
          echo "MAC: $(cat /sys/class/net/$(ip -o route get 1.1.1.1 | awk '{for(i=1;i<=NF;i++)if($i=="dev")print $(i+1)}')/address 2>/dev/null)"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: provision-logs
          path: /opt/compute-monster/provision/log/
          if-no-files-found: ignore
